apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: fitzenio-api-prod
  labels:
    cloud.googleapis.com/location: europe-north1
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        # Execution environment
        run.googleapis.com/execution-environment: gen2
        
        # CPU and memory allocation
        run.googleapis.com/cpu: "1"
        run.googleapis.com/memory: "1Gi"
        
        # Auto-scaling settings
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "50"
        
        # Timeout settings
        run.googleapis.com/timeout: "80s"
        run.googleapis.com/healthcheck-path: /health
        # Cloud SQL connection (if needed)
        # run.googleapis.com/cloudsql-instances: PROJECT_ID:REGION:INSTANCE_NAME
    spec:
      containerConcurrency: 20
      timeoutSeconds: 60
      # Use default compute service account for now
      # serviceAccountName: fitzenio-cloudrun@PROJECT_ID.iam.gserviceaccount.com
      containers:
      - name: fitzenio-api-prod
        image: gcr.io/PROJECT_ID/fitzenio-api-prod:IMAGE_TAG
        ports:
        - name: http1
          containerPort: 8080
        resources:
          limits:
            cpu: "1"
            memory: "1Gi"
          requests:
            cpu: "0.5"
            memory: "512Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        volumeMounts:
        - name: firebase-credentials
          mountPath: /app/credentials
          readOnly: true
      volumes:
      - name: firebase-credentials
        secret:
          secretName: firebase-admin-key-prod
          items:
          - key: latest
            path: firebase-admin-prod.json