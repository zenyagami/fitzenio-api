apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: fitzenio-api-dev
  labels:
    cloud.googleapis.com/location: europe-north1
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        # CPU and memory allocation (gen2 requires minimum 1 CPU)
        run.googleapis.com/cpu: "1"
        run.googleapis.com/memory: "512Mi"
        
        # Execution environment
        run.googleapis.com/execution-environment: gen2
        
        # Auto-scaling settings (smaller scale for dev)
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "3"
        
        # Timeout settings
        run.googleapis.com/timeout: "300s"
        
        # Cloud SQL connection (if needed)
        # run.googleapis.com/cloudsql-instances: PROJECT_ID:REGION:INSTANCE_NAME
    spec:
      containerConcurrency: 1
      timeoutSeconds: 300
      # Use default compute service account for now
      containers:
      - name: fitzenio-api-dev
        image: gcr.io/PROJECT_ID/fitzenio-api-dev:IMAGE_TAG
        ports:
        - name: http1
          containerPort: 8080
        env:
        - name: APP_ENVIRONMENT
          value: "DEVELOPMENT"
        - name: FATSECRET_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: FATSECRET_CLIENT_ID
              key: latest
        - name: FATSECRET_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: FATSECRET_CLIENT_SECRET
              key: latest
        - name: USDA_API_KEY
          valueFrom:
            secretKeyRef:
              name: USDA_API_KEY
              key: latest
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: OPENAI_API_KEY
              key: latest
        - name: USE_GEMINI
          value: "true"
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: GEMINI_API_KEY
              key: latest
        resources:
          limits:
            cpu: "1"
            memory: "512Mi"
          requests:
            cpu: "0.5"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        # No volume mounts needed for development (using embedded credentials)